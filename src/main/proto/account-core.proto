syntax = "proto3";
package com.banquito.core.account;
option java_package = "com.banquito.core.account";
option java_multiple_files = true;
option java_outer_classname = "AccountCoreProto";

service AccountCoreService {
    rpc BatchCredit (BatchCreditRequest) returns (BatchCreditResponse);
    rpc CorporateDebit (CorporateDebitRequest) returns (CorporateDebitResponse);
}

message BatchCreditRequest {
    string batch_id = 1;
    repeated CreditInstruction credits = 2;
}

message CreditInstruction {
    int32 account_id = 1;
    double amount = 2;
    string reference = 3;
    string transaction_uuid = 4;
}

message BatchCreditResponse {
    string batch_id = 1;
    int32 processed = 2;
    int32 failed = 3;
    repeated CreditResult results = 4;
}

message CreditResult {
    int32 account_id = 1;
    string status = 2;
    string transaction_id = 3;
}

message CorporateDebitRequest {
    string batch_id = 1;
    double total_amount = 2;
    double commission_amount = 3;
}

message CorporateDebitResponse {
    string transaction_id = 1;
    double debited_amount = 2;
    string status = 3;
}
